# SURVIVE OS Seed Bank Configuration
# Copy to /etc/survive/seed-bank.yml

database:
  path: /var/lib/survive/seed-bank/seed-bank.db

server:
  host: 0.0.0.0
  port: 8030

alerts:
  low_stock_threshold: 50
  min_diversity_sources: 3

redis:
  host: localhost
  port: 6379
  exchange_channel: agriculture.seed-exchange

version: "0.1.0"
