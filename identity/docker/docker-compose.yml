version: "3.8"

services:
  lldap:
    image: lldap/lldap:stable
    container_name: survive-lldap
    restart: unless-stopped
    ports:
      - "${LLDAP_LDAP_PORT:-3890}:3890"
      - "${LLDAP_HTTP_PORT:-17170}:17170"
    environment:
      - LLDAP_JWT_SECRET=${LLDAP_JWT_SECRET}
      - LLDAP_LDAP_BASE_DN=${LLDAP_LDAP_BASE_DN:-dc=survive,dc=local}
      - LLDAP_LDAP_USER_DN=${LLDAP_ADMIN_USERNAME:-admin}
      - LLDAP_LDAP_USER_PASS=${LLDAP_ADMIN_PASSWORD}
      - LLDAP_VERBOSE=${LLDAP_VERBOSE:-false}
      - LLDAP_DATABASE_URL=sqlite:///data/users.db?mode=rwc
    volumes:
      - lldap_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:17170"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  lldap_data:
    driver: local
