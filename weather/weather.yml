# SURVIVE OS Weather Station Configuration
# Copy to /etc/survive/weather.yml

database:
  path: /var/lib/survive/weather/weather.db

server:
  host: 0.0.0.0
  port: 8080

redis:
  url: redis://localhost:6379

alerts:
  pressure_drop_threshold_hpa: 3.0
  pressure_drop_window_hours: 3
  high_wind_kph: 60
  temp_drop_threshold_c: 8.0
  temp_drop_window_hours: 3

location:
  name: Community
  latitude: 0.0
  longitude: 0.0
  elevation_m: 0

frost:
  avg_last_spring: "04-15"
  avg_first_fall: "10-15"

version: "0.1.0"
