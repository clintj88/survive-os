    sub_modules:
      - maps/annotations
    depends_on: [platform, identity, maps-tiles]

  - id: maps-drones
    name: "Drone Aerial Maps"
    description: "Drone survey management, orthomosaic processing, change detection"
    core: false
    category: maps
