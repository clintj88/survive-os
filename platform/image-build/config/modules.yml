# ── Preset Profiles ────────────────────────────────────────────
# Quick-select bundles for common use cases

profiles:
  minimal:
    name: "Minimal (Core Only)"
    description: "Platform shell, identity, sync, backup — add modules later"
    modules: []  # Only core modules

  homestead:
    name: "Homestead"
    description: "Small farm/homestead: agriculture, weather, inventory, medical basics"
    modules:
      - agriculture-crops
      - agriculture-seeds
      - agriculture-livestock
      - agriculture-sensors
      - weather
      - resources-inventory
      - resources-tools
      - resources-energy
      - medical-ehr
      - medical-concepts
      - medical-pharmacy
      - education-kb

  community:
    name: "Community Hub"
    description: "Full community node: comms, governance, trade, medical, education"
    modules:
      - comms-bbs
      - comms-alerts
      - comms-meshtastic
      - governance
      - resources-inventory
      - resources-trade
      - medical-ehr
      - medical-concepts
      - medical-pharmacy
      - education-kb
      - education-learning
      - weather

  field-medical:
    name: "Field Medical"
    description: "Medical-focused: full medical suite with comms for coordination"
    modules:
      - medical-ehr
      - medical-concepts
      - medical-lab
      - medical-programs
      - medical-pharmacy
      - medical-epidemic
      - medical-specialty
      - comms-bbs
      - comms-alerts
      - education-kb

  full:
    name: "Full Install"
    description: "Every module — complete SURVIVE OS installation"
    modules:
      - comms-bbs
      - comms-alerts
      - comms-meshtastic
      - comms-ham-radio
      - medical-ehr
      - medical-concepts
      - medical-lab
      - medical-programs
      - medical-pharmacy
      - medical-epidemic
      - medical-specialty
      - agriculture-crops
      - agriculture-seeds
      - agriculture-livestock
      - agriculture-sensors
      - security
      - resources-inventory
      - resources-tools
      - resources-trade
      - resources-energy
      - resources-engineering
      - maps-tiles
      - maps-annotations
      - maps-drones
      - maps-print
      - governance
      - weather
      - education-kb
      - education-learning
