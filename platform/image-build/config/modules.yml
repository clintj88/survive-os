# SURVIVE OS Module Registry
# Defines all installable modules with metadata, dependencies, and sub-modules.
#
# core: true  = Required for all builds (cannot be deselected)
# core: false = Optional (user selects in configure menu)
# depends_on: List of module IDs that must also be installed

modules:
  # ── Core (always installed) ──────────────────────────────────

  - id: platform
    name: "Platform Shell"
    description: "Main UI shell, nginx proxy, systemd templates, shared libraries"
    core: true
    port: 8000
    sub_modules:
      - platform/nginx
      - platform/templates
      - shared/db
      - shared/blob
    depends_on: []

  - id: identity
    name: "Identity & Auth"
    description: "LLDAP directory, SSSD/PAM authentication, badge provisioner, RBAC"
    core: true
    port: 8001
    sub_modules:
      - identity
    depends_on: [platform]

  - id: sync
    name: "Sync Engine"
    description: "CRDT sync via Automerge, peer discovery, multi-transport replication"
    core: true
    port: 8100
    sub_modules:
      - sync
    depends_on: [platform]

  - id: backup
    name: "Backup System"
    description: "Automated daily backups, encrypted export, paper backup, restore"
    core: true
    port: 8095
    sub_modules:
      - platform/backup
    depends_on: [platform]

  - id: frontend
    name: "Frontend Shell"
    description: "Preact+HTM platform UI with module sidebar"
    core: true
    sub_modules:
      - frontend
    depends_on: [platform]

  # ── Communications ───────────────────────────────────────────

  - id: comms-bbs
    name: "Community BBS"
    description: "Bulletin board with topics, threads, and CRDT sync"
    core: false
    category: communications
    port: 8010
    sub_modules:
      - comms/bbs
    depends_on: [platform, identity]

  - id: comms-alerts
    name: "Emergency Alerts"
    description: "Multi-tier emergency broadcast across all comm channels"
    core: false
    category: communications
    sub_modules:
      - comms/alerts
    depends_on: [platform, identity, comms-bbs]

  - id: comms-meshtastic
    name: "Meshtastic Gateway"
    description: "Mesh radio bridge to Redis pub/sub, radio provisioning UI"
    core: false
    category: communications
    port: 8012
    sub_modules:
      - comms/meshtastic-gw
    depends_on: [platform, identity]

  - id: comms-ham-radio
    name: "Ham Radio"
    description: "Pat/Winlink email, JS8Call messaging, frequency DB, contact scheduler"
    core: false
    category: communications
    port: 8011
    sub_modules:
      - comms/ham-radio
    depends_on: [platform, identity]

  # ── Medical ──────────────────────────────────────────────────

  - id: medical-ehr
    name: "EHR-Lite"
    description: "Patient records, SOAP visits, vitals, wounds, vaccinations"
    core: false
    category: medical
    port: 8040
    sub_modules:
      - medical/ehr
    depends_on: [platform, identity, medical-concepts]

  - id: medical-concepts
    name: "Concept Dictionary"
    description: "Standardized clinical terminology, ICD-10/SNOMED/LOINC mappings"
    core: false
    category: medical
    port: 8041
    sub_modules:
      - medical/concepts
    depends_on: [platform, identity]

  - id: medical-lab
    name: "Lab Results"
    description: "Test catalog, panels, orders, auto-interpretation, alerts"
    core: false
    category: medical
    port: 8042
    sub_modules:
      - medical/lab
    depends_on: [platform, identity, medical-concepts]

  - id: medical-programs
    name: "Program Enrollment"
    description: "Clinical program workflows, state tracking, outcome recording"
    core: false
    category: medical
    port: 8043
    sub_modules:
      - medical/programs
    depends_on: [platform, identity, medical-concepts]

  - id: medical-pharmacy
    name: "Pharmacy"
    description: "Drug inventory, prescriptions, interactions, dosage calculator"
    core: false
    category: medical
    port: 8044
    sub_modules:
      - medical/pharmacy
    depends_on: [platform, identity]

  - id: medical-epidemic
    name: "Epidemic Surveillance"
    description: "Syndromic tracking, contact tracing, quarantine management"
    core: false
    category: medical
    port: 8045
    sub_modules:
      - medical/epidemic
    depends_on: [platform, identity]

  - id: medical-specialty
    name: "Specialty Care"
    description: "Prenatal, dental, mental health, and veterinary modules"
    core: false
    category: medical
    sub_modules:
      - medical/specialty
    depends_on: [platform, identity]

  # ── Agriculture ──────────────────────────────────────────────

  - id: agriculture-crops
    name: "Crop Planner"
    description: "Planting schedules, companion planting, harvest tracking"
    core: false
    category: agriculture
