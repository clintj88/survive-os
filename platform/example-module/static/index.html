<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SURVIVE OS - Example Module</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 2rem; }
        h1 { color: #00d4aa; margin-bottom: 1rem; }
        .status { color: #888; margin-bottom: 2rem; }
        form { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
        input { flex: 1; padding: 0.5rem; border: 1px solid #333; background: #16213e; color: #e0e0e0; border-radius: 4px; }
        button { padding: 0.5rem 1rem; background: #00d4aa; color: #1a1a2e; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .note { background: #16213e; padding: 0.75rem; margin-bottom: 0.5rem; border-radius: 4px; border-left: 3px solid #00d4aa; }
        .note small { color: #888; }
    </style>
</head>
<body>
    <h1>SURVIVE OS - Example Module</h1>
    <div class="status" id="status">Loading...</div>

    <form id="noteForm">
        <input type="text" id="noteInput" placeholder="Add a note..." required>
        <button type="submit">Add</button>
    </form>

    <div id="notes"></div>

    <script>
        async function loadHealth() {
            const res = await fetch('/health');
            const data = await res.json();
            document.getElementById('status').textContent = `Status: ${data.status} | Version: ${data.version}`;
        }

        async function loadNotes() {
            const res = await fetch('/api/notes');
            const notes = await res.json();
            document.getElementById('notes').innerHTML = notes.map(n =>
                `<div class="note"><div>${n.content}</div><small>${n.created_at}</small></div>`
            ).join('');
        }

        document.getElementById('noteForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('noteInput');
            await fetch('/api/notes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: input.value })
            });
            input.value = '';
            loadNotes();
        });

        loadHealth();
        loadNotes();
    </script>
</body>
</html>
