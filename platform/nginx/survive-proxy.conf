# SURVIVE OS - Nginx Reverse Proxy Configuration
# Routes requests to module backends based on the port map.

upstream platform_shell    { server 127.0.0.1:8000; }
upstream identity_admin    { server 127.0.0.1:8001; }
upstream comms_bbs         { server 127.0.0.1:8010; }
upstream security_ops      { server 127.0.0.1:8020; }
upstream agriculture       { server 127.0.0.1:8030; }
upstream medical           { server 127.0.0.1:8040; }
upstream resources         { server 127.0.0.1:8050; }
upstream maps              { server 127.0.0.1:8060; }
upstream governance        { server 127.0.0.1:8070; }
upstream weather           { server 127.0.0.1:8080; }
upstream education         { server 127.0.0.1:8090; }

server {
    listen 80;
    server_name survive.local;

    # Platform shell (main UI)
    location / {
        proxy_pass http://platform_shell;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Identity admin
    location /identity/ {
        proxy_pass http://identity_admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Communication / BBS
    location /comms/ {
        proxy_pass http://comms_bbs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Security / Drone ops
    location /security/ {
        proxy_pass http://security_ops/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Agriculture
    location /agriculture/ {
        proxy_pass http://agriculture/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Medical (encrypted)
    location /medical/ {
        proxy_pass http://medical/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Resources / Inventory
    location /resources/ {
        proxy_pass http://resources/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Maps
    location /maps/ {
        proxy_pass http://maps/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Governance
    location /governance/ {
        proxy_pass http://governance/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Weather
    location /weather/ {
        proxy_pass http://weather/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Education / Knowledge base
    location /education/ {
        proxy_pass http://education/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check aggregator
    location /health {
        proxy_pass http://platform_shell/health;
    }
}
